services:
  - type: web
    name: warehouse-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: warehouse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: ADMIN_EMAIL
        value: d.guselnikov@breezy.kz
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FIRST_NAME
        value: Admin
      - key: ADMIN_LAST_NAME
        value: User
      - key: SYNC_ADMIN_ON_STARTUP
        value: "false"
      - key: CORS_ORIGINS
        # Replace with your actual frontend URL after first deploy.
        value: '["https://warehouse-frontend.onrender.com"]'
      - key: CORS_ALLOW_LAN
        value: "false"
    disks:
      - name: warehouse-uploads
        mountPath: /opt/render/project/src/backend/uploads
        sizeGB: 2

  - type: web
    env: static
    name: warehouse-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        # Replace with your actual backend URL after first deploy.
        value: https://warehouse-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: warehouse-db
    databaseName: warehouse_db
    user: warehouse_user
