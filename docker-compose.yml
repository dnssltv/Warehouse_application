version: "3.9"

services:
  db:
    image: postgres:16
    container_name: warehouse_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: warehouse_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: warehouse_frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

  proxy:
    image: nginx:1.27-alpine
    container_name: warehouse_proxy
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  db_backup:
    image: postgres:16
    container_name: warehouse_db_backup
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    command: >
      sh -c "
      mkdir -p /backups &&
      while true; do
        timestamp=$$(date +%Y-%m-%d_%H-%M-%S);
        pg_dump -h db -p ${POSTGRES_PORT} -U ${POSTGRES_USER} -d ${POSTGRES_DB} | gzip > /backups/warehouse_$${timestamp}.sql.gz;
        find /backups -type f -name '*.sql.gz' -mtime +${BACKUP_KEEP_DAYS} -delete;
        sleep $$((${BACKUP_INTERVAL_HOURS} * 3600));
      done
      "

volumes:
  postgres_data: